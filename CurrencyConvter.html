<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );
}

.container{
    width:600px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px;
    box-shadow:
    0 15px 35px rgba(0,0,0,0.4);
        margin-top: -20%;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:32px;
}

.converter{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

select,
input{
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    font-size:16px;
    background:white;
}

select{
    width:130px;
}

input{
    flex:1;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    background:linear-gradient(
        45deg,
        #06b6d4,
        #3b82f6
    );
    color:white;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(59,130,246,0.4);
}

#result{
    margin-top:25px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:white;
    padding:15px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">

    <h1>Currency Converter</h1>

    <div class="converter">
        <select id="op"></select>

        <input type="number" id="i1" placeholder="Enter Amount">

        <select id="op2"></select>
    </div>

    <button type="button" id="btn">Convert</button>

    <p id="result"></p>

</div>

<script>

async function option(){

    let btn = document.getElementById("btn");
    let select = document.getElementById("op");
    let select2 = document.getElementById("op2");

    let response = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    let data = await response.json();

    for(let d in data.rates){

        let op1 = document.createElement("option");
        op1.value = d;
        op1.textContent = d;
        select.appendChild(op1);

        let op2 = document.createElement("option");
        op2.value = d;
        op2.textContent = d;
        select2.appendChild(op2);
    }

    btn.addEventListener("click",function(){

        let from = document.getElementById("op").value;
        let to = document.getElementById("op2").value;
        let amount = parseFloat(document.getElementById("i1").value);

        if(isNaN(amount)){
            alert("Please Enter Amount");
            return;
        }

        let result = amount * (data.rates[to] / data.rates[from]);

        document.getElementById("result").innerHTML =
        `${amount} ${from} = ${result.toFixed(2)} ${to}`;
    });
}

option();

</script>

</body>
</html>
